<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>学生成绩查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; min-height: 100vh; }
        .header { background: #4a90d9; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; font-weight: 500; }
        .header .user-info { font-size: 14px; display: flex; align-items: center; gap: 12px; }
        .header .user-info span { opacity: 0.9; }
        .header .user-info a { color: #fff; text-decoration: none; background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 4px; font-size: 13px; }
        .header .user-info a:hover { background: rgba(255,255,255,0.3); }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 32px; }
        h2 { text-align: center; color: #333; margin-bottom: 24px; font-size: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #4a90d9; }
        button[type="submit"] { width: 100%; padding: 12px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button[type="submit"]:hover { background: #357abd; }
        .error { color: #e74c3c; text-align: center; margin-bottom: 12px; font-size: 14px; min-height: 20px; }
        .result { margin-top: 24px; }
        .result table { width: 100%; border-collapse: collapse; }
        .result th, .result td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .result th { background: #f8f9fa; color: #555; font-weight: 500; }
        .result .student-info { margin-bottom: 16px; }
        .result .student-info p { margin-bottom: 4px; color: #555; font-size: 14px; }
        .result .student-info strong { color: #333; }
        .result h3 { margin-bottom: 12px; color: #333; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>学生成绩查询系统</h1>
        <div class="user-info">
            <span id="usernameDisplay"></span>
            <a href="#" id="logoutBtn">退出登录</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h2>成绩查询</h2>
            <div id="error" class="error"></div>
            <form id="queryForm">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="id_card">身份证号</label>
                    <input type="text" id="id_card" name="id_card" required>
                </div>
                <button type="submit">查询成绩</button>
            </form>
            <div id="result" class="result"></div>
        </div>
    </div>
    <script>
        // 检查登录状态
        var token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        var username = localStorage.getItem('username') || '';
        var role = localStorage.getItem('role') || '';
        document.getElementById('usernameDisplay').textContent = username + (role === 'root' ? ' (管理员)' : '');

        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        });

        // 查询表单
        document.getElementById('queryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var errEl = document.getElementById('error');
            var resultEl = document.getElementById('result');
            errEl.textContent = '';
            resultEl.innerHTML = '';

            var body = new URLSearchParams();
            body.set('name', document.getElementById('name').value);
            body.set('id_card', document.getElementById('id_card').value);

            var currentToken = localStorage.getItem('token');
            try {
                var resp = await fetch('/4', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': 'Bearer ' + currentToken
                    },
                    body: body.toString()
                });
                var data = await resp.json();
                if (resp.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    localStorage.removeItem('role');
                    window.location.href = 'login.html';
                    return;
                }
                if (!resp.ok) {
                    errEl.textContent = data.error || '查询失败';
                    return;
                }
                renderResult(data);
            } catch (err) {
                errEl.textContent = '网络错误，请重试';
            }
        });

        function renderResult(data) {
            var resultEl = document.getElementById('result');
            if (!data.student) {
                resultEl.innerHTML = '<p style="text-align:center;color:#888;">未找到学生信息</p>';
                return;
            }
            var s = data.student;
            var html = '<div class="student-info">';
            html += '<p><strong>学号：</strong>' + escapeHtml(s.student_id) + '</p>';
            html += '<p><strong>姓名：</strong>' + escapeHtml(s.name) + '</p>';
            html += '<p><strong>性别：</strong>' + escapeHtml(s.gender) + '</p>';
            html += '<p><strong>省份：</strong>' + escapeHtml(s.province) + '</p>';
            html += '<p><strong>学校：</strong>' + escapeHtml(s.school) + '</p>';
            html += '</div>';

            if (data.scores && data.scores.length > 0) {
                html += '<h3>成绩列表</h3>';
                html += '<table><thead><tr><th>科目</th><th>分数</th></tr></thead><tbody>';
                for (var i = 0; i < data.scores.length; i++) {
                    html += '<tr><td>' + escapeHtml(data.scores[i].subject) + '</td><td>' + data.scores[i].score + '</td></tr>';
                }
                html += '</tbody></table>';
            }
            resultEl.innerHTML = html;
        }

        function escapeHtml(s) {
            if (!s) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(s));
            return div.innerHTML;
        }
    </script>
</body>
</html>
