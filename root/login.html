<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录 - 学生成绩查询系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 40px; width: 380px; }
        h2 { text-align: center; color: #333; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #4a90d9; }
        button { width: 100%; padding: 12px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #357abd; }
        .error { color: #e74c3c; text-align: center; margin-bottom: 12px; font-size: 14px; min-height: 20px; }
        .footer { text-align: center; margin-top: 16px; font-size: 14px; color: #888; }
        .footer a { color: #4a90d9; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>登录</h2>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit">登录</button>
        </form>
        <div class="footer">
            没有账号？<a href="register.html">去注册</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var errEl = document.getElementById('error');
            errEl.textContent = '';

            var body = new URLSearchParams();
            body.set('username', document.getElementById('username').value);
            body.set('password', document.getElementById('password').value);

            try {
                var resp = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: body.toString()
                });
                var data = await resp.json();
                if (resp.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username || document.getElementById('username').value);
                    localStorage.setItem('role', data.role || 'user');
                    window.location.href = 'index.html';
                } else {
                    errEl.textContent = data.error || '登录失败';
                }
            } catch (err) {
                errEl.textContent = '网络错误，请重试';
            }
        });
    </script>
</body>
</html>
